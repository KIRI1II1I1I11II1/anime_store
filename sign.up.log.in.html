<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
       <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Blue Flame Anime Store</title>
</head> 
<body>
<div class="auth-wrapper">
    <div class="auth-form">
        <div class="input-row">
            <div class="icon-square">
                <img src="images\Frame (5).png" alt="phone" class="user-img">
            </div>
            <div class="field-container">
                <input type="text" placeholder="phone number">
            </div>
        </div>

        <div class="input-row">
            <div class="icon-square">
                <img src="images\Frame (6).png" alt="email" class="user-img">
            </div>
            <div class="field-container">
                <input type="email" placeholder="email">
            </div>
        </div>

        <button class="btn-signup">sign up</button>

        <p class="login-link">if you already have an account</p>

        <div class="social-panel">
            <div class="social-btn">
                <img src="images\Frame (7).png" alt="Google" class="user-img">
            </div>
            <div class="social-btn">
                <img src="images\Frame (8).png" alt="Apple" class="user-img">
            </div>
        </div>
    </div>
</div>
</body>
